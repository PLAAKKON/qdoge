<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Grass Battle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hud" aria-label="Game heads-up display">
      <div class="chip">
        <span class="label">Time</span>
        <strong id="timeLeft">02:00</strong>
      </div>
      <div class="chip chip-primary">
        <span class="label">Score</span>
        <strong id="score">0</strong>
      </div>
      <div class="chip">
        <span class="label">Month</span>
        <strong id="month">0.0</strong>
      </div>
    </header>

    <section class="stage-wrap">
      <canvas id="grassCanvas" aria-label="Grass growth simulation"></canvas>
      <div id="overlayMessage" class="overlay-message" hidden></div>
      <button id="fullscreenBtn" class="btn-fs-float" aria-label="Toggle fullscreen" title="Full screen">⛶</button>
    </section>

    <section class="controls" aria-label="Game controls">
      <button id="menuToggleBtn" class="btn-menu-toggle" aria-label="Toggle controls">▾</button>
      <div class="sun-control">
        <div id="sunPad" class="sun-pad" role="application" aria-label="Touch and drag to move sun"></div>
      </div>

      <div class="game-action-row">
        <button id="resetBtn" class="btn btn-secondary" type="button">↺ Reset</button>
        <button id="scoreBtn" class="btn btn-secondary" type="button">Score</button>
        <button id="decorateBtn" class="btn btn-secondary" disabled>Decorate</button>
        <button id="hallBtn" class="btn btn-secondary" type="button">Top 3</button>
      </div>

      <div id="hallPanel" class="hall-panel" hidden>
        <div class="hall-header">
          <p class="control-title">Hall of Fame Top 3</p>
          <button id="clearHallBtn" class="btn btn-secondary hall-clear-btn" type="button">Clear</button>
        </div>
        <ol id="hallOfFameList" class="hall-list"></ol>
      </div>

      <div id="decoratePanel" class="decorate-panel" hidden>
        <div class="actions compact">
          <button id="screenshotBtn" class="btn btn-primary">Save Screenshot</button>
          <button id="shareBtn" class="btn btn-secondary">Share</button>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js?v=20260429a"></script>
</body>
</html>
